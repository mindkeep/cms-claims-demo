# Docker Compose — expanded in WP7
# For local development without Docker, use: make serve
version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      CMS_DB_PATH: /data/processed/cms.duckdb
      CMS_LOG_LEVEL: INFO
      CMS_OLLAMA_BASE_URL: http://ollama:11434/v1
    volumes:
      - ./data:/data
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  ollama_data:
