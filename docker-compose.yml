# Docker Compose — skeleton expanded in WP5/WP7
# For local development without Docker, use: make serve
version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CMS_DB_PATH=/data/processed/cms.duckdb
      - CMS_LOG_LEVEL=INFO
    volumes:
      - ./data:/data
    # WP7 adds: health check, restart policy, depends_on
